<script>

const ably = new Ably.Realtime("bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4")
const channel = ably.channels.get("vmix-hora")

let visible=false

function hideImmediately(){

document.getElementById("countBox").style.opacity="0"
document.getElementById("logoBox").style.opacity="0"

}

hideImmediately()



channel.subscribe("hora",(message)=>{

const data=message.data



if(data.action==="on"){

if(visible) return

startSystem(data.freq)

visible=true

}



if(data.action==="off"){

stopSystem()

visible=false

}



if(data.action==="freq"){

updateFrequency(data.freq)

}

})

</script>
