<script src="timer.js"></script>

<script>

const ably = new Ably.Realtime({
key:"bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4",
recover:true
});

const channel = ably.channels.get("vmix-hora");

ably.connection.on(state=>{
console.log("Ably:",state.current);
});

channel.subscribe("control",(msg)=>{

const data=msg.data;

if(data.action==="on") startSystem();

if(data.action==="off") stopSystem();

if(data.action==="freq") updateFrequency(data.minutes);

});

</script>
