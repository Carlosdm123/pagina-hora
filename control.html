<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#panel{
text-align:center;
}

#preview{
width:640px;
height:360px;
border:2px solid #444;
margin-bottom:30px;
}

input{
font-size:20px;
width:80px;
text-align:center;
}

button{
font-size:18px;
padding:8px 18px;
margin-left:10px;
}

.switch{

width:80px;
height:40px;
background:#555;
border-radius:20px;
margin:auto;
position:relative;
cursor:pointer;

}

.switch::after{

content:'';
width:34px;
height:34px;
background:white;
position:absolute;
top:3px;
left:3px;
border-radius:50%;
transition:0.3s;

}

.switch.on{
background:#2ecc71;
}

.switch.on::after{
left:43px;
}

#status{
margin-top:10px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="panel">

<h2>CONTROL CONTADOR</h2>

<iframe id="preview" src="overlayhora.html"></iframe>

<br>

<label>Repetir bloque cada (minutos)</label>

<br><br>

<input type="number" id="freq" value="30">

<button onclick="setFreq()">ACEPTAR</button>

<br><br>

<div id="switch" class="switch"></div>

<div id="status">OFF</div>

</div>

<script>

const ably=new Ably.Realtime('bUKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4')

const channel=ably.channels.get("vmix-hora")

let state=false

const sw=document.getElementById("switch")
const status=document.getElementById("status")

sw.onclick=function(){

state=!state

if(state){

sw.classList.add("on")
status.innerText="ON"

channel.publish("horaControl",{
type:"on",
freq:parseInt(document.getElementById("freq").value)
})

}else{

sw.classList.remove("on")
status.innerText="OFF"

channel.publish("horaControl",{
type:"off"
})

}

}



function setFreq(){

const freq=parseInt(document.getElementById("freq").value)

channel.publish("horaControl",{
type:"freq",
freq:freq
})

}

</script>

</body>

</html>
