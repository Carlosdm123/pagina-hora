<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{

font-family:Arial;
background:#111;
color:white;

display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

#panel{

text-align:center;

}

#preview{

width:640px;
height:360px;
border:2px solid #444;
margin-bottom:30px;

}

input{
font-size:20px;
width:80px;
text-align:center;
}

.switch{

margin-top:20px;

}

#status{

margin-top:10px;
font-size:22px;
font-weight:bold;

}

</style>

</head>

<body>

<div id="panel">

<h2>CONTROL CONTADOR</h2>

<iframe id="preview" src="overlayhora.html"></iframe>

<br>

<label>Repetir bloque cada (minutos)</label>

<br><br>

<input type="number" id="freq" value="30">

<br><br>

<label class="switch">

<input type="checkbox" id="toggle">

</label>

<div id="status">OFF</div>

</div>

<script>

const ably=new Ably.Realtime('bUKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4')

const channel=ably.channels.get("vmix-hora")

const toggle=document.getElementById("toggle")
const status=document.getElementById("status")

toggle.addEventListener("change",function(){

const freq=document.getElementById("freq").value

if(this.checked){

status.innerText="ON"

channel.publish("horaControl",{
state:"on",
freq:parseInt(freq)
})

}else{

status.innerText="OFF"

channel.publish("horaControl",{
state:"off"
})

}

})

</script>

</body>

</html>
