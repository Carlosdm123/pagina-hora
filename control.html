<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;

display:flex;
justify-content:center;
align-items:center;
height:100vh;

margin:0;
}

#panel{

text-align:center;

}

#preview{

width:640px;
height:360px;
border:2px solid #444;
margin-bottom:30px;

}

input{
font-size:20px;
width:80px;
text-align:center;
}

button{
font-size:18px;
padding:8px 16px;
margin-left:10px;
cursor:pointer;
}

.switch{

width:90px;
height:42px;
background:#444;
border-radius:25px;
margin:auto;
margin-top:25px;
position:relative;
cursor:pointer;
transition:.3s;

}

.switch::after{

content:'';
width:36px;
height:36px;
background:white;
position:absolute;
top:3px;
left:3px;
border-radius:50%;
transition:.3s;

}

.switch.on{
background:#2ecc71;
}

.switch.on::after{
left:51px;
}

#status{

margin-top:15px;
font-size:26px;
font-weight:bold;

}

</style>

</head>

<body>

<div id="panel">

<h2>CONTROL CONTADOR ELECCIONES</h2>

<iframe id="preview" src="overlayhora.html"></iframe>

<br>

<label>Repetir bloque cada (minutos)</label>

<br><br>

<input type="number" id="freq" value="30">

<button onclick="setFreq()">ACEPTAR</button>

<br><br>

<div id="switch" class="switch"></div>

<div id="status">OFF</div>

</div>

<script>

const ably = new Ably.Realtime("bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4")

const channel = ably.channels.get("vmix-hora")

let state=false

const sw=document.getElementById("switch")
const status=document.getElementById("status")



sw.onclick=function(){

state=!state

const freq=parseInt(document.getElementById("freq").value)



if(state){

sw.classList.add("on")

status.innerText="ON"

channel.publish("update",{

action:"on",

freq:freq

})



}else{

sw.classList.remove("on")

status.innerText="OFF"

channel.publish("update",{

action:"off"

})

}

}



function setFreq(){

const freq=parseInt(document.getElementById("freq").value)

channel.publish("update",{

action:"freq",

freq:freq

})

}

</script>

</body>

</html>
