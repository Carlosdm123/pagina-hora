<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
background:#1e1e1e;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:60px;
}

.preview{
width:854px;
height:480px;
border:4px solid white;
margin:auto;
overflow:hidden;
}

iframe{
width:1920px;
height:1080px;
transform:scale(0.444);
transform-origin:top left;
border:none;
}

.panel{
margin-top:40px;
}

.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#444;
transition:.4s;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"";
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:#2c8f6b;
}

input:checked + .slider:before{
transform:translateX(26px);
}

input[type=number]{
margin-top:20px;
padding:8px;
font-size:16px;
width:120px;
}

button{
margin-left:10px;
padding:8px 16px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>CONTROL CONTADOR ELECCIONES</h2>

<div class="preview">
<iframe src="overlayhora.html"></iframe>
</div>

<div class="panel">

<label class="switch">
<input type="checkbox" id="toggle">
<span class="slider"></span>
</label>

<br>

<input type="number" id="minutes" value="10">

<button onclick="setFreq()">Aceptar</button>

</div>

<script>

const ably = new Ably.Realtime("bOKecA.F01Gsw:f6ccqlfGnZrnTbs9ZqERdlbn7AK9PwwCtsplaep_DL4");
const channel = ably.channels.get("vmix-hora");

const toggle = document.getElementById("toggle");

toggle.addEventListener("change",()=>{

if(toggle.checked){

channel.publish({action:"on"});

}else{

channel.publish({action:"off"});

}

});

function setFreq(){

const min = Number(document.getElementById("minutes").value);

channel.publish({
action:"freq",
minutes:min
});

}

</script>

</body>
</html>
